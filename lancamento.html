     <main class="main_lancamento">
     <iframe class="video" width="100%" height="150%" src="https://www.youtube.com/embed/vQsryuNmsL0" title="Ford Ranger 2022 | Gerações" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

     <section class="input_carros">

     <input class="input_diesel" type="checkbox" name="xls_diesel" value="diesel" id="carro_diesel">
     <label for="diesel"><strong>XLS 2.2 Diesel 4x4 AT 2022</strong><br>Preço sugerido: a partir de R$220.690 <img src="imagens ford/info.png" alt=""></label>

     <input class="input_storm" type="checkbox" name="storm" value="storm" id="carro_storm">
     <label for="storm"><strong>Storm 3.2 Diesel 4x4 AT 2022</strong><br>Preço sugerido: a partir de R$222.790 <img src="imagens ford/info.png" alt=""></label>
