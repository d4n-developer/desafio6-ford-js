<!DOCTYPE html>
<html lang="pt-br">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/style.css">
   <title>Ford Brasil</title>
</head>

<body>
   <header class="header">
      <a class="logo_topo" href="index.html">
         <img src="imagens ford/logo-ford-256.png" alt="imagem da logo da Ford.">
      </a>
      <p>
         <a class="header_home" href="index.html">Home</a>
         <a class="header_lancamento" href="lancamento.html">Lançamento</a>
         <a class="header_contato" href="contato.html">Contato</a>
      <p>
         </nav>
   </header>
   
   <main class="main_contato">
      <img class="img_contato" src="imagens ford/xls 2.2 diesel.jpg" alt="Ford Diesel 2022">

      <form class="form-grid">
         <h3>Sobre Você</h3>
         <input 
         type="text"
         placeholder="NOME DE USUÁRIO*"
          required
          >

         <input 
          type="text" 
          d="CPF" 
          required placeholder="CPF*" 
          maxlength="14"
            onkeyup="handleCPF(event)" 
            pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
            title="Digite o CPF no formato: 000.000.000-00" 
            inputmode="numeric">
         <script>
            const handleCPF = (event) => {
               let input = event.target
               input.value = CPFMask(input.value)
            }
            const CPFMask = (value) => {
               if (!value) return
               value = value.replace(/\D/g, "");
               value = value.replace(/(\d{3})(\d)/, "$1.$2");
               value = value.replace(/(\d{3})(\d)/, "$1.$2");
               value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
               return value
            }
         </script>

         <input 
          type="email" 
          placeholder="EMAIL *"
          required 
          >

         <input 
          type="tel" 
          name="telefone"
           required 
           placeholder="TELEFONE*" 
           maxlength="16"
            onkeyup="handlePhone(event)" 
            pattern="\([0-9]{2}\)\s[0-9]{4,5}-[0-9]{4}"
            title="digite seu número no formato (11) 91234-5678">
         <script>
            const handlePhone = (event) => {
               let input = event.target
               input.value = phoneMask(input.value)
            }
            const phoneMask = (value) => {
               if (!value) return ""
               value = value.replace(/\D/g, "");
              value = value.replace(/(\d{2})(\d)/, '($1) $2');
               value = value.replace(/(\d)(\d{4})$/, '$1-$2');
               return value
            }
         </script>

         <select required aria-label="TIPO DE CONTATO?"> 
           <option value="">TIPO DE CONTATO</option>
            <option>Elogio</option>
            <option>Reclamação</option>
            <option>Solicitação</option>
         </select>

         <textarea placeholder="MENSAGEM" required></textarea>

         <button class="botao_enviar" type="submit">Enviar</button>
      </form>
      <script src="js/form.js"></script>
   </main>
   <footer class="footer">
      <div class="footer-conteudo">
         <section class="redes">
          <p>Redes Sociais</p>

            <a href="http://www.youtube.com/@fordbrasil" target="_blank">

            <a href="https://www.instagram.com/fordbrasil/" target="_blank">
               <img src="imagens ford/instagram-logo-50.png" alt="Instagram">
            </a>

         <div class="logo">
            <a href="index.html">
               <img src="imagens ford/ford-96.png" alt="logo Ford"></a>
         </div>

         <div class="copyright">

               <p>Copyright © 2026 Ford Motor Company - Todos os direitos reservados</p>
            </a>
         </div>
      </div>
   </footer>

</body>

</html>
